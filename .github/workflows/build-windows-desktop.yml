name: Build Windows Desktop EXE

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install desktop dependencies
        shell: pwsh
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r desktop\requirements.txt
          python -m pip install --quiet pillow

      - name: Generate application icon
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python desktop\generate_app_icon.py
          if (-not (Test-Path "desktop\generated\sim_core_workbench.png")) {
            throw "Application icon generation failed."
          }

      - name: Test vehicle simulation engine
        shell: pwsh
        run: python desktop\test_vehicle_simulation_engine.py

      - name: Test Drawing1 centreline simulation
        shell: pwsh
        run: python desktop\test_vehicle_simulation_drawing1.py

      - name: Test vehicle simulation UI
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python desktop\test_vehicle_simulation_ui.py

      - name: Test desktop adapters
        shell: pwsh
        run: |
          python desktop\test_dxf_graph_converter.py
          python desktop\test_cad_graph_facility.py
          python desktop\test_rail_file.py
          python desktop\test_automod_pm_converter.py
          python desktop\test_isaac_sim_exporter.py

      - name: Configure C++ Core
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build C++ Core
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Test C++ Core
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Test native desktop integration
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
          SIM_CORE_BIN: ${{ github.workspace }}\build\Release\sim-core.exe
        run: |
          if (-not (Test-Path $env:SIM_CORE_BIN)) {
            throw "Core binary not found: $env:SIM_CORE_BIN"
          }
          python desktop\smoke_test.py
          python desktop\graph_ui_smoke_test.py

      - name: Package Windows executable
        shell: pwsh
        run: |
          $CoreBinary = "$PWD\build\Release\sim-core.exe"
          $AppIcon = "$PWD\desktop\generated\sim_core_workbench.png"
          $SampleDir = "$PWD\examples\cross_domain"
          $PyInstallerArgs = @(
            "--noconfirm",
            "--clean",
            "--onefile",
            "--windowed",
            "--name", "Sim_Core_Flow_Workbench",
            "--icon", $AppIcon,
            "--add-binary", "$CoreBinary;.",
            "--add-data", "$SampleDir;examples\cross_domain",
            "--collect-all", "ezdxf",
            "desktop\app_wrapper.py"
          )
          python -m PyInstaller @PyInstallerArgs
          if (-not (Test-Path "dist\Sim_Core_Flow_Workbench.exe")) {
            throw "Windows executable was not generated."
          }

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist\Sim_Core_Flow_Workbench.exe package\Sim_Core_Flow_Workbench.exe
          if (Test-Path "README.md") { Copy-Item README.md package\README.md }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: Sim_Core_Flow_Workbench_Windows
          path: package/
          if-no-files-found: error
          retention-days: 30
