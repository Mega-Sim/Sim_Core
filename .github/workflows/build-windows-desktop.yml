name: Build Windows Desktop EXE

on:
  push:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install desktop test dependencies
        shell: pwsh
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r desktop\requirements.txt

      - name: Test vehicle simulation engine
        shell: pwsh
        run: python desktop\test_vehicle_simulation_engine.py

      - name: Test Drawing1 centreline simulation
        shell: pwsh
        run: python desktop\test_vehicle_simulation_drawing1.py

      - name: Test vehicle simulation UI
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python desktop\test_vehicle_simulation_ui.py 2>&1 | Tee-Object -FilePath vehicle-ui-test.log
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) { exit $testExit }

      - name: Upload vehicle UI test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-ui-test-log
          path: vehicle-ui-test.log
          if-no-files-found: warn
          retention-days: 7

      - name: Build Core and Windows executable
        shell: pwsh
        run: |
          & "$PWD\desktop\build_windows.ps1"

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/Sim_Core_Flow_Workbench.exe package/Sim_Core_Flow_Workbench.exe
          if (Test-Path "README.md") { Copy-Item README.md package/README.md }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: Sim_Core_Flow_Workbench_Windows
          path: package/
          if-no-files-found: error
          retention-days: 30
