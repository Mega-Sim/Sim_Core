name: Build Windows Desktop EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "desktop/requirements.txt") {
            python -m pip install -r desktop/requirements.txt
          }
          python -m pip install PySide6 ezdxf pyinstaller

      - name: Build Sim_Core Flow Workbench EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name Sim_Core_Flow_Workbench `
            --paths desktop `
            desktop/app.py

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item dist/Sim_Core_Flow_Workbench.exe package/Sim_Core_Flow_Workbench.exe
          if (Test-Path "README.md") { Copy-Item README.md package/README.md }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: Sim_Core_Flow_Workbench_Windows
          path: package/
          if-no-files-found: error
          retention-days: 30
