name: Sim_Core Native Desktop - Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - feature/5차-native-desktop-workbench
    paths:
      - "desktop/**"
      - "apps/**"
      - "include/**"
      - "src/**"
      - "examples/**"
      - "CMakeLists.txt"
      - "cmake/**"
      - ".github/workflows/native-desktop-windows.yml"

jobs:
  build-windows-exe:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: desktop/requirements.txt

      - name: Build native desktop executable
        shell: pwsh
        run: ./desktop/build_windows.ps1

      - name: Package executable
        shell: pwsh
        run: Compress-Archive -Path dist/Sim_Core_Flow_Workbench.exe -DestinationPath Sim_Core_Flow_Workbench-windows-x64.zip

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: Sim_Core_Flow_Workbench-windows-x64
          path: Sim_Core_Flow_Workbench-windows-x64.zip
          if-no-files-found: error
          retention-days: 30
